<style>
body{
    margin:0;
    font-family:Arial;
    background:#05070f;
    color:#d1e8ff;
}

/* LOADER */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:#05070f;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.bar{
    width:280px;
    height:8px;
    background:#111a2e;
    border-radius:10px;
    overflow:hidden;
}

.progress{
    width:0%;
    height:100%;
    background:#00f7ff;
    animation:load 2.5s linear forwards;
}

@keyframes load{
    to{width:100%;}
}

/* NAV */
nav{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    background:#0c1424;
    border-bottom:1px solid #00f7ff33;
}

nav button{
    background:#111a2e;
    color:#00f7ff;
    border:1px solid #00f7ff33;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

.section{display:none;padding:20px;}
.active{display:block;}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.module{
    background:#0c1424;
    border:1px solid rgba(0,255,255,0.15);
    border-radius:10px;
    padding:15px;
}

.btn{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
}

.green{background:#00f7ff;color:#000;}
.blue{background:#2d7dff;color:#fff;}
.red{background:#ff3b3b;color:#fff;}
.youtube{background:#ff2e2e;color:#fff;}

.signature{
    text-align:center;
    font-size:11px;
    margin:15px;
    color:#00f7ff;
}
</style>
</head>

<script>
function show(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));

setTimeout(()=>{
    document.getElementById("loader").style.display="none";
},2500);
