<style>
body{
    margin:0;
    font-family:Arial;
    background:#05070f;
    color:#d1e8ff;
    padding-top:10px;
}

/* NAV */
nav{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    background:#0c1424;
    border-bottom:1px solid #00f7ff33;
}

nav button{
    background:#111a2e;
    color:#00f7ff;
    border:1px solid #00f7ff33;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

/* SECCIONES */
.section{
    display:none;
    padding:20px;
}
.active{display:block;}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.module{
    background:#0c1424;
    border:1px solid rgba(0,255,255,0.15);
    border-radius:10px;
    padding:15px;
}

/* BOTONES */
.btn{
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
}

.green{background:#00f7ff;color:#000;}
.blue{background:#2d7dff;color:#fff;}
.red{background:#ff3b3b;color:#fff;}
.youtube{background:#ff2e2e;color:#fff;}

/* CHAT */
.chatbox{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:15px;
}

.msg{
    max-width:320px;
    padding:10px;
    border-radius:12px;
    background:#0c1424;
    border:1px solid #00f7ff33;
}

.msg.me{
    align-self:flex-end;
    background:#1a2a44;
}

/* STATUS */
#status{
    font-weight:bold;
}

/* ADMIN PANEL */
#adminPanel{
    display:none;
    position:fixed;
    bottom:10px;
    left:10px;
    background:#0c1424;
    border:1px solid #00f7ff33;
    padding:10px;
    border-radius:10px;
    width:220px;
}

#adminPanel button{
    margin-top:5px;
    width:100%;
    padding:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

</style>
</head>

<body>

<nav>

    <button onclick="show('chat')">CHAT</button>

        <div class="msg">ERIS BOT<br>Bienvenido al sistema</div>

        <div class="msg">ERIS BOT<br>Sistema estable</div>

    </div>

</div>

<!-- PANEL -->
<div id="panel" class="section">

    <h2>⚙ PANEL DE CONTROL</h2>

    <div class="container">

        <div class="module">
            <h3>CANAL</h3>
            <a class="btn green" href="https://whatsapp.com/channel/0029Vb7NOUpF1YlXOQHW6d3O">ABRIR</a>

        <div class="module">

            <a class="btn blue" href="https://chat.whatsapp.com/EyfZfsZy2dr6fy855Gr2im">UNIRSE</a>

        <div class="module">
            <h3>YOUTUBE</h3>
            <a class="btn youtube" href="https://youtube.com/@theduvalinbs">VISITAR</a>
        </div>

    </div>

</div>

<!-- CHAT -->
<div id="chat" class="section">
    <h2>💬 CHAT VIEW</h2>

    <div class="chatbox">
        <div class="msg">ERIS BOT<br>Modo chat activo</div>
        <div class="msg me">Usuario<br>test</div>
    </div>

</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

    <button onclick="toggleSystem()" style="background:#00f7ff;color:#000;">ON/OFF SISTEMA</button>
    <button onclick="editMessage()" style="background:#2d7dff;color:#fff;">EDITAR MENSAJE</button>
    <button onclick="clearChat()" style="background:#ff3b3b;color:#fff;">LIMPIAR CHAT</button>

</div>

<script>

let systemOn = true;

/* TOKEN ADMIN */
const TOKEN = "ERIS-ADMIN-2026";

/* LOGIN */
window.onload = () => {
    let input = prompt("🔐 TOKEN ADMIN:");

    if(input === TOKEN){
        document.getElementById("adminPanel").style.display="block";
        alert("ACCESO ADMIN CONCEDIDO");
    }else{
        alert("MODO USUARIO ACTIVO");
    }
};

/* NAV */
function show(id){
    if(!systemOn) return alert("Sistema apagado");

    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* ON/OFF */
function toggleSystem(){
    systemOn = !systemOn;

    document.getElementById("status").innerText =
    systemOn ? "🟢 ONLINE" : "🔴 OFFLINE";

    document.body.style.filter =
    systemOn ? "none" : "brightness(0.3)";
}

/* EDITAR MENSAJE */
function editMessage(){
    let text = prompt("Nuevo mensaje:");

    if(text){
        document.querySelectorAll(".msg")[0].innerHTML =
        "ERIS BOT<br>" + text;
    }
}

/* LIMPIAR CHAT */
function clearChat(){
    document.getElementById("chatBox").innerHTML =
    "<div class='msg'>ERIS BOT<br>Chat reiniciado</div>";
}

</script>
