<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ERIS SYSTEM // ACCESS NODE</title>

<meta property="og:title" content=" ERIS SYSTEM // ACCESS GRANTED">
<meta property="og:description" content="Sistema activo. Usuario verificado. Conectando al nodo principal...">
<meta property="og:image" content="https://i.imgur.com/4M34hi2.jpeg">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #050816, #000);
    font-family:'Orbitron', Arial;
    color:#00f7ff;
    overflow:hidden;
}

.panel{
    width:420px;
    padding:25px;
    border-radius:15px;
    background:rgba(10,15,31,0.92);
    border:1px solid #00f7ff55;
    box-shadow:0 0 35px rgba(0,255,255,0.15);
    text-align:center;
}

/* typing */
.typing{
    font-size:13px;
    border-right:2px solid #00f7ff;
    white-space:nowrap;
    overflow:hidden;
    width:0;
    margin:15px auto;
    animation:typing 3s steps(40,end) forwards, blink .7s infinite;
}

@keyframes typing{
    from{width:0}
    to{width:100%}
}

@keyframes blink{
    50%{border-color:transparent}
}

/* loading bar */
.bar{
    width:100%;
    height:6px;
    background:#0d1a2f;
    border-radius:10px;
    overflow:hidden;
    margin-top:20px;
}

.fill{
    width:0%;
    height:100%;
    background:#00f7ff;
    animation:load 3s forwards;
}

@keyframes load{
    from{width:0%}
    to{width:100%}
}

button{
    margin-top:20px;
    padding:10px;
    width:100%;
    border:none;
    border-radius:8px;
    background:#00f7ff;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00c2cc;
}
</style>
</head>

<body>

<div class="panel">

    <h1> ERIS SYSTEM</h1>

    <div class="typing">
        Conectando al nodo principal...  
        Verificando usuario...  
        Acceso permitido...
    </div>

    <div class="bar">
        <div class="fill"></div>
    </div>

    <button onclick="enter()">ENTER SYSTEM</button>

</div>

<script>
function enter(){
    document.querySelector("button").innerText = "CONNECTING...";

    setTimeout(() => {
        document.querySelector("button").innerText = "REDIRECTING...";
    }, 1500);

    setTimeout(() => {
        window.location.href = ERIS WhatsApp Group;
    }, 3000);
}
</script>

</body>
</html>
