<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERIS SYSTEM V4</title>

<meta property="og:title" content="🤖 ERIS SYSTEM V4">
<meta property="og:description" content="👑 Sistema mejorado - Versión 4">
<meta property="og:image" content="https://files.catbox.moe/f62isa.png">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}

h1 {
    margin: 0;
    font-size: 28px;
}

.container {
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

button {
    background: #38bdf8;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

.page {
    display: none;
}

.active {
    display: block;
}

.slider {
    overflow-x: auto;
    white-space: nowrap;
}

.slider div {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    padding: 10px;
    margin-right: 10px;
    border-radius: 10px;
    min-width: 200px;
}
</style>
</head>

<body>

<header>
<h1>🤖 ERIS SYSTEM V4</h1>
<p>Sistema mejorado y más dinámico</p>
<button onclick="changePage('home')">Inicio</button>
<button onclick="changePage('panel')">Panel</button>
</header>

<div class="container">

<div id="home" class="page active">
    <div class="card">
        <h2>Bienvenido</h2>
        <p>Versión 4 del sistema ERIS con interfaz mejorada.</p>
    </div>

    <div class="card slider">
        <div>⚡ Rápido</div>
        <div>🔒 Seguro</div>
        <div>🤖 Automático</div>
        <div>📊 Dinámico</div>
    </div>
</div>

<div id="panel" class="page">
    <div class="card">
        <h2>Panel de control</h2>
        <p>Opciones del sistema.</p>
        <button onclick="alert('Función demo')">Acción</button>
    </div>
</div>

</div>

<script>
function changePage(page){
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
